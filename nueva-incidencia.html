<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nueva incidencia</title>

  <!-- Hojas de estilo generales y del tema -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/theme.css">
</head>

<body>

<div class="layout">

  <!-- Barra lateral de navegación -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="logo-box">
        <div class="logo-circle"></div>
        <div>
          <h2>ViniloTFG Admin</h2>
          <p>Gestión interna</p>
        </div>
      </div>
    </div>

    <!-- Menú lateral con acceso al resto de secciones -->
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item">Dashboard</a>
      <a href="pedidos.html" class="nav-item">Pedidos</a>
      <a href="clientes.html" class="nav-item">Clientes</a>
      <a href="productos.html" class="nav-item">Productos</a>
      <a href="estadisticas.html" class="nav-item">Estadísticas</a>
      <a href="configuracion.html" class="nav-item">Configuración</a>
    </nav>

    <!-- Información básica del usuario actual -->
    <div class="sidebar-bottom">
      <div class="user-card">
        <div class="user-avatar">V</div>
        <div>
          <h4>Víctor</h4>
          <p>Administrador</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- Contenido principal -->
  <main class="main-content">

    <!-- Cabecera de la página -->
    <div class="panel-header">
      <div>
        <h1>Nueva incidencia</h1>
        <p>Registra una nueva incidencia en el sistema</p>
      </div>
    </div>

    <!-- Panel que contiene el formulario -->
    <div class="panel">

      <!-- Formulario para crear una nueva incidencia -->
      <form id="formIncidencia">

        <!-- Primera parte del formulario organizada en cuadrícula -->
        <div class="form-grid">

          <div>
            <label>Cliente</label>
            <input type="text" id="cliente" required>
          </div>

          <div>
            <label>Pedido</label>
            <input type="text" id="pedido" required>
          </div>

          <div>
            <label>Tipo</label>
            <input type="text" id="tipo" required>
          </div>

          <div>
            <label>Prioridad</label>
            <select id="prioridad">
              <option>Baja</option>
              <option>Media</option>
              <option>Alta</option>
              <option>Urgente</option>
            </select>
          </div>

        </div>

        <!-- Campo de descripción del problema -->
        <div style="margin-top:20px;">
          <label>Descripción</label>
          <textarea id="descripcion" rows="5" required></textarea>
        </div>

        <!-- Campo para asignar un responsable -->
        <div style="margin-top:20px;">
          <label>Responsable</label>
          <input type="text" id="responsable">
        </div>

        <!-- Botones de acción del formulario -->
        <div class="form-actions">
          <button type="submit" class="primary-btn">Guardar incidencia</button>
          <button type="button" class="secondary-btn" onclick="window.location.href='index.html'">
            Cancelar
          </button>
        </div>

      </form>

    </div>

  </main>

</div>

<!-- Script compartido y lógica específica de incidencias -->
<script src="js/shared.js"></script>
<script src="js/incidencias.js"></script>

</body>
</html>
