<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <!-- Permite responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Título de la pestaña -->
  <title>Login - ViniloTFG Admin</title>

  <!-- Estilos globales del proyecto -->
  <link rel="stylesheet" href="css/global.css">

  <!-- Estilos propios del login -->
  <link rel="stylesheet" href="css/login.css">

  <!-- Tema claro/oscuro -->
  <link rel="stylesheet" href="css/theme.css">
</head>
<body>

  <!-- Contenedor principal centrado -->
  <div class="login-page">

    <!-- Tarjeta de login -->
    <div class="login-card">

      <!-- Logo + título -->
      <div class="login-logo">
        <div class="logo-circle"></div>
        <div>
          <h1>ViniloTFG Admin</h1>
          <p>Acceso al panel de gestión</p>
        </div>
      </div>

      <!-- Formulario -->
      <form id="loginForm" class="login-form">

        <!-- Campo email -->
        <div class="login-field">
          <label for="email">Correo</label>
          <input type="email" id="email" placeholder="Introduce tu correo" required>
        </div>

        <!-- Campo contraseña -->
        <div class="login-field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Introduce tu contraseña" required>
        </div>

        <!-- Mensaje de error -->
        <div id="loginError" class="login-error"></div>

        <!-- Botón login -->
        <button type="submit" class="primary-btn login-btn">
          Iniciar sesión
        </button>
      </form>

    </div>
  </div>

  <!-- JS del login -->
  <script src="js/login.js"></script>
</body>
</html>
